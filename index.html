<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Java Pro IDE - Variables + Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="topbar">
        <span class="title">⚡ Java Pro IDE</span>
        <button id="runBtn">▶ Execute</button>
        <button class="secondary" id="formatBtn">𝐀 Format</button>
        <button id="clearBtn">🗑 Clear All</button>
        <button class="secondary" id="autoBtn">🧠 Auto: ON</button>
    </div>

    <div class="container">
        <div class="main-panels">
            <div class="editor-panel">
                <textarea id="editor" spellcheck="false" autocorrect="off" autocomplete="off"></textarea>
            </div>

            <div class="side-panel">
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="variables">📊 Variables</button>
                    <button class="tab-btn" data-tab="logs">📝 Logs</button>
                </div>
                <div id="variables" class="tab-content active">
                    <div class="placeholder">Execute to see real-time values →</div>
                </div>
                <div id="logs" class="tab-content">
                    <div class="placeholder">Execution logs appear here step-by-step...</div>
                </div>
            </div>
        </div>

        <div class="bottom-panel">
            <div id="console">✨ Java simulation ready! Try some code 🚀</div>
            <div class="statusbar">
                <span id="status">Ln 1, Col 1 | Pro IDE</span>
                <span id="info">Ready</span>
            </div>
        </div>
    </div>

    <script src="js/editor.js"></script>
    <script src="js/simulator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
