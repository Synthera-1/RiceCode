<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Java Pro IDE – Browser-Based Java Simulator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Try simple relative path first – most reliable in subfolder deploys -->
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<header class="topbar">
    <div class="brand">
        <span class="logo">Java Pro IDE</span>
        <span class="version">v1.4</span>
    </div>
    <div class="toolbar">
        <button id="runBtn" class="primary">Run</button>
        <button id="formatBtn" class="secondary">Format Code</button>
        <button id="clearBtn" class="secondary danger">Clear</button>
        <button id="addFileBtn" class="secondary">+ New File</button>
    </div>
</header>

<div class="container">
    <div class="main-panels">
        <div class="editor-panel">
            <div id="file-tabs" class="file-tabs"></div>
            <div class="editor-wrapper">
                <textarea id="editor" spellcheck="false" autocorrect="off" autocomplete="off"></textarea>
            </div>
        </div>

        <div class="side-panel">
            <div class="tab-bar">
                <button class="tab active" data-tab="variables">Variables</button>
                <button class="tab" data-tab="logs">Logs</button>
                <button class="tab" data-tab="updates">Changelog</button>
            </div>

            <div id="variables" class="tab-content active"></div>
            <div id="logs" class="tab-content"></div>
            <div id="updates" class="tab-content">
                <div class="changelog-container">
                    <h2>Release Notes</h2>
                    <p>(Changelog content here – currently static)</p>
                </div>
            </div>
        </div>
    </div>

    <div class="terminal-panel">
        <div class="terminal-header">
            <span>Console</span>
            <span id="execution-status" class="status">Ready</span>
        </div>
        <div id="console-output" class="terminal-output"></div>
        <div id="console-input-area" class="terminal-input hidden">
            <span class="prompt-symbol">←</span>
            <input type="text" id="console-input" autocomplete="off" placeholder="Enter input..." />
            <button id="submit-input">Send</button>
        </div>
    </div>
</div>

<!-- Simple relative paths – should work on GitHub Pages subfolder -->
<script src="./js/editor.js"></script>
<script src="./js/simulator.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/main.js"></script>

<!-- Tiny debug script – shows alert if main.js loaded successfully -->
<script>
  window.addEventListener('load', () => {
    if (typeof runCode === 'function') {
      console.log("main.js seems to have loaded OK – runCode exists");
    } else {
      alert("JavaScript problem: runCode function is missing.\nCheck console (F12) for errors.");
    }

    // Quick manual test – click anywhere on page logs something
    document.body.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') {
        console.log("Button clicked:", e.target.id);
      }
    });
  });
</script>

</body>
</html>
